backend: cuda

# Safe CUDA benchmark configuration for Purplejeans.
# Measured on Tesla V100:
# 64x64   -> ~3 s
# 128x128 -> ~32 s
# 256x256 -> ~8-9 min

grid_sizes:
  - 64
  - 128
  - 256

# CPU/OpenMP host threads.
# CUDA parallelism happens inside GPU kernels.
threads:
  - 1

runs: 1

validate_against_serial: false
generate_plots: false

output_root: angio2d_c/output

timeout_per_run: 900
continue_on_failure: false
