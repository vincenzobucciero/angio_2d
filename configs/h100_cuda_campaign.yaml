backend: cuda

grid_sizes:
  - 64
  - 128
  - 256
  - 512
  - 1024

threads:
  - 1

runs: 5

validate_against_serial: false
generate_plots: false

output_root: results/h100_cuda_campaign

# Set very high timeout to avoid application-level interruption during long H100 runs.
timeout_per_run: 604800
continue_on_failure: false
