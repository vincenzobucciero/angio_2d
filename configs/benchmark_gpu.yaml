# GPU CUDA BENCHMARK - ANGIO2D
# =============================
# GPU-accelerated benchmark for NVIDIA GPUs
# Use to measure GPU speedup vs CPU baselines
#
# MACHINE-SPECIFIC PARAMETERS:
#   - grid_sizes: GPUs can handle larger grids (2048+) compared to CPU
#   - threads: Always [1] for GPU (GPU is single "thread" from CPU perspective)
#   - SLURM partition/GPU allocation: See submission script (jobs/*.sbatch)
#
# HARDWARE NOTES:
#   - This config is optimized for H100 GPU (sm_90, 2024-era)
#   - For older GPUs (V100=sm_70): compilation auto-adapts
#   - For other systems: Check GPU architecture in build output

backend: cuda

# Grid configurations for GPU
# GPUs can efficiently handle large grids due to massive parallelism
# Typical progression: [64, 128, 256, 512, 1024, 2048]
# For quick testing: [256, 512, 1024]
# For H100 scaling study: [1024, 2048]
grid_sizes:
  - 1024
  - 2048

# Thread count (always 1 for GPU - GPU scheduler handles parallelism)
threads:
  - 1

# Number of runs per grid
# GPU: typically 1-3 runs (very stable, low variance)
runs: 1

# Output directory
output_root: results/benchmark_gpu

# Timeout per single run (in seconds)
# GPU runs can be VERY long for large grids:
#   - 1024x1024: ~1800-6000s depending on GPU
#   - 2048x2048: ~8000-20000s
# Set generously to avoid premature timeouts
timeout_per_run: 86400  # 24 hours (safe for any grid)

# Validation and plotting
validate_against_serial: false  # GPU results validated in production pipeline
generate_plots: true            # Generate GPU benchmark figures
continue_on_failure: false      # Stop on error to preserve GPU allocation

# GPU-specific debugging (optional)
# Set to true for detailed CUDA profiling (adds small overhead)
cuda_profile_detailed: false
