# ANGIO2D Benchmark Configuration
# ================================
#
# Defines grid sizes, simulation parameters, and benchmark setup
# for multi-backend (serial, openmp, cuda) scaling tests.
#
# Format: minimalst YAML for portability
# Parser: params_init_from_yaml() in params.c

# Grid configurations to test
grids:
  - { Mx: 64,   My: 64,   label: "64x64" }
  - { Mx: 128,  My: 128,  label: "128x128" }
  - { Mx: 256,  My: 256,  label: "256x256" }
  - { Mx: 512,  My: 512,  label: "512x512" }
  - { Mx: 1024, My: 1024, label: "1024x1024" }

# Simulation parameters (rest use default_params.m equivalents)
simulation:
  Tf: 0.5                # Final time
  num_runs: 5            # Median over N runs
  tolerance: 1e-10       # RelL2 tolerance for correctness

# Benchmark configuration
benchmark:
  backends: [serial, openmp]     # Backends to test
  threads: [1, 2, 3, 4]          # Thread counts for OpenMP
  output_dir: results            # Output directory prefix

# Environment settings
environment:
  OMP_PROC_BIND: "close"         # Thread affinity
  OMP_PLACES: "cores"            # Bind to cores not SMT
  OMP_NUM_THREADS: null          # Override via CLI --threads
